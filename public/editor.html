<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>TXO サイト編集</title>
  <style>
    *{box-sizing:border-box}body{margin:0;background:#07110f;color:#fff;font-family:system-ui,sans-serif}
    button,input,select{font:inherit}.login{min-height:100vh;display:grid;place-items:center}.login>div{width:min(420px,90vw);padding:28px;border:1px solid #00d9bd;background:#061b18}
    .login input{width:100%;margin:16px 0;padding:12px;background:#07110f;color:#fff;border:1px solid #27645c}.primary{background:#00e5c8;color:#001b18;border:0}
    button{padding:9px 13px;border:1px solid #27645c;background:#07110f;color:#fff;cursor:pointer;border-radius:4px}
    .app{display:block;height:100vh}.toolbar{height:58px;display:flex;align-items:center;gap:7px;padding:8px;border-bottom:1px solid #27645c;overflow-x:auto;white-space:nowrap}
    .toolbar strong{margin-right:auto}.workspace{height:calc(100vh - 58px);display:grid;grid-template-columns:240px minmax(0,1fr) 280px}.canvas{padding:12px;background:#222}
    iframe{width:100%;height:100%;border:1px solid #00d9bd;background:#fff}.panel{padding:14px;border-left:1px solid #27645c;overflow:auto}.panel label{display:block;margin:12px 0 5px;font-size:12px;color:#9bbbb5}
    .panel input,.panel select{width:100%;padding:9px;background:#061b18;color:#fff;border:1px solid #27645c}.hint{font-size:12px;color:#9bbbb5;line-height:1.6}
    .left-panel{padding:12px;border-right:1px solid #27645c;overflow:auto}.nav-editor-row{display:grid;grid-template-columns:1fr auto;gap:5px;margin-bottom:8px}.nav-editor-row input{min-width:0;padding:8px;background:#061b18;color:#fff;border:1px solid #27645c}.nav-editor-actions{display:flex;gap:3px}.nav-editor-actions button{padding:5px 7px}
    @media(max-width:800px){.workspace{grid-template-columns:1fr}.panel{position:fixed;right:0;bottom:0;width:100%;max-height:38vh;background:#07110f;z-index:3}}
  </style>
</head>
<body>
  <div class="app" id="app">
    <div class="toolbar">
      <strong>TXO ビジュアル編集</strong>
      <button id="undo">1つ戻る</button><button id="move">ドラッグ移動</button><button id="resize">自由リサイズ</button>
      <button data-add="text">文字追加</button><button data-add="image">画像追加</button><button data-add="video">動画追加</button>
      <button data-add="link">リンク追加</button><button data-add="section">セクション追加</button>
      <button id="duplicate">複製</button><button id="remove">削除</button>
      <button id="reset" style="border-color:#a33">初期状態に戻す</button>
      <button id="publish" class="primary">公開</button><button onclick="window.open('/','_blank')">公開画面</button>
    </div>
    <div class="workspace">
      <aside class="left-panel">
        <h3>ページ・Navigation</h3>
        <p class="hint">ページ名を変更できます。ページを押すと編集画面を切り替えます。</p>
        <div id="navEditor"></div>
        <button id="addNav">Navigationを追加</button>
        <hr style="border-color:#27645c;margin:18px 0">
        <button id="selectNavigation">Navigation全体を選択</button>
        <button id="selectPageBackground">ページ全体を選択</button>
      </aside>
      <div class="canvas"><iframe id="frame" src="/preview"></iframe></div>
      <aside class="panel">
        <h3>選択中の要素</h3><p class="hint" id="selectedName">画面内の編集したい場所をクリック</p>
        <p class="hint">ページ移動は通常クリック。Navigation自体の編集はAltキーを押しながらクリックします。選択中は矢印キーで1px、Shift+矢印キーで10px移動できます（「ドラッグ移動」中はマウスでも移動可）。</p>
        <label>文字</label><input id="text">
        <label>フォント（プリセット）</label>
        <select id="fontFamily">
          <option value="">指定なし（サイトの既定）</option>
          <option value="'Inter',sans-serif">Inter（既定・角ゴシック）</option>
          <option value="'Noto Sans JP',sans-serif">Noto Sans JP（角ゴシック）</option>
          <option value="'Noto Serif JP',serif">Noto Serif JP（明朝体）</option>
          <option value="'Zen Kaku Gothic New',sans-serif">Zen角ゴシック</option>
          <option value="'Zen Old Mincho',serif">Zen明朝</option>
          <option value="'Shippori Mincho',serif">しっぽり明朝</option>
          <option value="monospace">等幅（Monospace）</option>
          <option value="'Georgia',serif">Georgia（欧文セリフ）</option>
        </select>
        <label>フォント名を直接入力（Google Fontsから自動読込）</label>
        <input id="customFont" placeholder="例: Playfair Display / M PLUS Rounded 1c">
        <p class="hint">Google Fontsに存在するフォント名を入力すると自動的に読み込んで反映します。</p>
        <label>文字サイズ</label><input id="fontSize" placeholder="例: 32px">
        <label>文字色</label><input id="color" type="color">
        <div class="panel-row" style="display:flex;gap:8px;margin:8px 0">
          <button id="boldToggle" style="flex:1">太字</button>
          <button id="italicToggle" style="flex:1">斜体</button>
        </div>
        <label>文字揃え</label>
        <select id="textAlign">
          <option value="">指定なし</option>
          <option value="left">左揃え</option>
          <option value="center">中央揃え</option>
          <option value="right">右揃え</option>
        </select>
        <label>行間</label><input id="lineHeight" placeholder="例: 1.6">
        <label>文字間隔</label><input id="letterSpacing" placeholder="例: 0.05em">
        <label>背景色</label><input id="background" type="color">
        <label>背景画像URL</label><input id="backgroundImage" placeholder="https://...">
        <label>背景動画URL</label><input id="backgroundVideo" placeholder="https://...mp4">
        <label>リンク先URL</label><input id="linkUrl" placeholder="https://...">
        <label>幅</label><input id="width" placeholder="例: 100% / 500px">
        <label>高さ</label><input id="height" placeholder="例: 400px">
        <label>最大幅</label><input id="maxWidth" placeholder="例: 800px">
        <label>内側余白</label><input id="padding" placeholder="例: 24px">
        <label>外側余白</label><input id="margin" placeholder="例: 16px">
        <label>角丸</label><input id="radius" placeholder="例: 8px">
        <label>枠線の太さ</label><input id="borderWidth" placeholder="例: 1px">
        <label>枠線の色</label><input id="borderColor" type="color">
        <label>影</label>
        <select id="boxShadow">
          <option value="">なし</option>
          <option value="0 2px 8px rgba(0,0,0,.25)">薄い影</option>
          <option value="0 8px 24px rgba(0,0,0,.35)">中くらいの影</option>
          <option value="0 16px 40px rgba(0,0,0,.5)">濃い影</option>
        </select>
        <label>不透明度（0〜100）</label><input id="opacity" placeholder="例: 100">
        <label>重なり順（z-index）</label><input id="zIndex" placeholder="例: 10">
        <label>画像・動画の表示方法</label>
        <select id="objectFit">
          <option value="">指定なし</option>
          <option value="cover">カバー（切り抜き）</option>
          <option value="contain">全体を収める</option>
          <option value="fill">引き伸ばす</option>
        </select>
        <label>レイアウト</label><select id="display"><option value="">選択</option><option value="block">通常</option><option value="flex">横並び</option><option value="grid">グリッド</option></select>
        <label>方向</label><select id="flexDirection"><option value="">選択</option><option value="row">横方向</option><option value="column">縦方向</option></select>
        <label>横の配置</label><select id="justifyContent"><option value="">選択</option><option value="flex-start">左寄せ</option><option value="center">中央</option><option value="flex-end">右寄せ</option><option value="space-between">両端揃え</option><option value="space-around">均等（外側半分）</option><option value="space-evenly">均等</option></select>
        <label>縦の配置</label><select id="alignItems"><option value="">選択</option><option value="flex-start">上揃え</option><option value="center">中央</option><option value="flex-end">下揃え</option><option value="stretch">引き伸ばし</option></select>
        <label>折り返し</label><select id="flexWrap"><option value="">選択</option><option value="nowrap">折り返さない</option><option value="wrap">折り返す</option></select>
        <label>列数</label><select id="columns"><option value="">選択</option><option value="1fr">1列</option><option value="repeat(2,1fr)">2列</option><option value="repeat(3,1fr)">3列</option><option value="repeat(4,1fr)">4列</option></select>
        <label>要素間の余白</label><input id="gap" placeholder="例: 16px">
        <label>配置方法</label>
        <div class="panel-row" style="display:flex;gap:8px;margin-top:5px">
          <button id="freePosition" style="flex:1">自由配置にする</button>
          <button id="normalPosition" style="flex:1">通常配置に戻す</button>
        </div>
        <p class="hint">「自由配置」にすると、ドラッグ移動や矢印キーで画面上どこへでも動かせます。</p>
      </aside>
    </div>
  </div>
  <input id="file" type="file" hidden>
  <script>
    const app=document.querySelector('#app'),frame=document.querySelector('#frame');
    const selectedName=document.querySelector('#selectedName'),text=document.querySelector('#text'),linkUrl=document.querySelector('#linkUrl');
    const navEditor=document.querySelector('#navEditor'),move=document.querySelector('#move'),file=document.querySelector('#file');
    let selected=null,moving=false,history=[];
    const snapshot=()=>{if(selected)history.push({el:selected,html:selected.innerHTML,style:selected.style.cssText})};
    const selectElement=el=>{
      if(selected)selected.style.outline='';
      selected=el;if(!selected)return;
      selectedName.textContent=selected.tagName+' / '+(selected.textContent||'').slice(0,40);
      text.value=selected.children.length?'':selected.textContent||'';
      linkUrl.value=selected.closest('a')?.getAttribute('href')||'';
      document.querySelector('#opacity').value=selected.style.opacity!==''?Math.round(parseFloat(selected.style.opacity)*100):'';
      selected.style.outline='2px solid #00e5c8';
      attachHandles();
    };
    let handles=[];
    function clearHandles(){handles.forEach(h=>h.remove());handles=[]}
    function makeHandle(cursor,onDrag){
      const d=selected.ownerDocument;
      const h=d.createElement('div');
      h.style.cssText=`position:fixed;width:12px;height:12px;background:#00e5c8;border:2px solid #001b18;border-radius:2px;z-index:2147483647;cursor:${cursor}`;
      h.addEventListener('pointerdown',e=>{
        e.preventDefault();e.stopPropagation();
        snapshot();
        const startX=e.clientX,startY=e.clientY;
        const rect=selected.getBoundingClientRect();
        const startW=rect.width,startH=rect.height;
        selected.style.width=startW+'px';selected.style.height=startH+'px';
        const move=ev=>{onDrag(ev.clientX-startX,ev.clientY-startY,startW,startH);positionHandles()};
        const up=()=>{d.removeEventListener('pointermove',move);d.removeEventListener('pointerup',up)};
        d.addEventListener('pointermove',move);d.addEventListener('pointerup',up);
      });
      d.body.appendChild(h);
      handles.push(h);
    }
    function positionHandles(){
      if(!selected||handles.length<3)return;
      const r=selected.getBoundingClientRect();
      const [se,e,s]=handles;
      se.style.left=(r.right-6)+'px';se.style.top=(r.bottom-6)+'px';
      e.style.left=(r.right-6)+'px';e.style.top=(r.top+r.height/2-6)+'px';
      s.style.left=(r.left+r.width/2-6)+'px';s.style.top=(r.bottom-6)+'px';
    }
    function attachHandles(){
      clearHandles();
      if(!selected)return;
      makeHandle('nwse-resize',(dx,dy,w0,h0)=>{selected.style.width=Math.max(20,w0+dx)+'px';selected.style.height=Math.max(20,h0+dy)+'px'});
      makeHandle('ew-resize',(dx,_dy,w0)=>{selected.style.width=Math.max(20,w0+dx)+'px'});
      makeHandle('ns-resize',(_dx,dy,_w0,h0)=>{selected.style.height=Math.max(20,h0+dy)+'px'});
      positionHandles();
    }
    const pageIdOf=el=>{const value=el.getAttribute('onclick')||'';return value.match(/showPage\(['"]([^'"]+)/)?.[1]||''};
    const renderNavEditor=()=>{const d=frame.contentDocument;if(!d)return;const tabs=[...d.querySelectorAll('.nav-tab')];navEditor.innerHTML='';tabs.forEach((tab,index)=>{const row=document.createElement('div');row.className='nav-editor-row';const input=document.createElement('input');input.value=tab.textContent.trim();input.oninput=()=>tab.textContent=input.value;const actions=document.createElement('div');actions.className='nav-editor-actions';const open=document.createElement('button');open.textContent='開く';open.onclick=()=>frame.contentWindow.showPage(pageIdOf(tab));const up=document.createElement('button');up.textContent='↑';up.onclick=()=>{if(tab.previousElementSibling)tab.parentElement.insertBefore(tab,tab.previousElementSibling);renderNavEditor()};const down=document.createElement('button');down.textContent='↓';down.onclick=()=>{if(tab.nextElementSibling)tab.parentElement.insertBefore(tab.nextElementSibling,tab);renderNavEditor()};const del=document.createElement('button');del.textContent='×';del.onclick=()=>{snapshot();tab.remove();renderNavEditor()};actions.append(open,up,down,del);row.append(input,actions);navEditor.append(row)})};
    function nudge(dx,dy){
      if(!selected)return;
      const cs=selected.ownerDocument.defaultView.getComputedStyle(selected);
      if(cs.position==='static')selected.style.position='relative';
      const l=parseFloat(selected.style.left)||0;
      const t=parseFloat(selected.style.top)||0;
      selected.style.left=(l+dx)+'px';
      selected.style.top=(t+dy)+'px';
      positionHandles();
    }
    frame.onload=()=>{clearHandles();const d=frame.contentDocument;renderNavEditor();d.addEventListener('click',e=>{const navControl=e.target.closest('.nav-tab,.logo,.navcta');if(navControl&&!e.altKey)return;e.preventDefault();e.stopPropagation();selectElement(e.target)},true);
      d.addEventListener('pointerdown',e=>{if(!moving||!selected||e.target!==selected)return;snapshot();const x=e.clientX,y=e.clientY,l=parseFloat(selected.style.left)||0,t=parseFloat(selected.style.top)||0;selected.style.position='relative';const mm=v=>{selected.style.left=l+v.clientX-x+'px';selected.style.top=t+v.clientY-y+'px';positionHandles()};const up=()=>{d.removeEventListener('pointermove',mm);d.removeEventListener('pointerup',up)};d.addEventListener('pointermove',mm);d.addEventListener('pointerup',up)},true);
      d.addEventListener('scroll',()=>positionHandles(),true);
      d.addEventListener('keydown',e=>{
        if(!selected)return;
        const tag=(e.target.tagName||'').toLowerCase();
        if(tag==='input'||tag==='textarea'||e.target.isContentEditable)return;
        const step=e.shiftKey?10:1;
        if(e.key==='ArrowUp'){snapshot();nudge(0,-step);e.preventDefault()}
        else if(e.key==='ArrowDown'){snapshot();nudge(0,step);e.preventDefault()}
        else if(e.key==='ArrowLeft'){snapshot();nudge(-step,0);e.preventDefault()}
        else if(e.key==='ArrowRight'){snapshot();nudge(step,0);e.preventDefault()}
        else if(e.key==='Backspace'||e.key==='Delete'){e.preventDefault();doRemove()}
      },true);
    };
    const bind=(id,fn)=>document.querySelector('#'+id).onchange=e=>{if(!selected)return;snapshot();fn(e.target.value)};
    function ensureFontLoaded(name){
      if(!name)return;
      const d=frame.contentDocument,id='gf-'+name.replace(/\s+/g,'-');
      if(d.getElementById(id))return;
      const link=d.createElement('link');
      link.id=id;link.rel='stylesheet';
      link.href=`https://fonts.googleapis.com/css2?family=${encodeURIComponent(name).replace(/%20/g,'+')}:wght@400;500;700;900&display=swap`;
      d.head.appendChild(link);
    }
    bind('text',v=>selected.textContent=v);bind('fontSize',v=>selected.style.fontSize=v);bind('color',v=>selected.style.color=v);bind('background',v=>selected.style.backgroundColor=v);
    bind('fontFamily',v=>{const m=v.match(/'([^']+)'/);if(m)ensureFontLoaded(m[1]);selected.style.fontFamily=v});
    bind('customFont',v=>{if(!v)return;ensureFontLoaded(v);selected.style.fontFamily=`'${v}',sans-serif`});
    bind('textAlign',v=>selected.style.textAlign=v);bind('lineHeight',v=>selected.style.lineHeight=v);bind('letterSpacing',v=>selected.style.letterSpacing=v);
    bind('backgroundImage',v=>{selected.style.backgroundImage=`url("${v}")`;selected.style.backgroundSize='cover';selected.style.backgroundPosition='center'});
    bind('backgroundVideo',v=>{selected.style.position='relative';selected.style.overflow='hidden';selected.insertAdjacentHTML('afterbegin',`<video autoplay muted loop playsinline style="position:absolute;inset:0;width:100%;height:100%;object-fit:cover;z-index:0"><source src="${v}"></video>`)});
    bind('linkUrl',v=>{const link=selected.closest('a');if(link)link.href=v;else{const a=selected.ownerDocument.createElement('a');a.href=v;selected.replaceWith(a);a.append(selected);selectElement(a)}});
    bind('width',v=>selected.style.width=v);bind('height',v=>selected.style.height=v);bind('maxWidth',v=>selected.style.maxWidth=v);bind('padding',v=>selected.style.padding=v);bind('margin',v=>selected.style.margin=v);bind('radius',v=>selected.style.borderRadius=v);
    bind('borderWidth',v=>{selected.style.borderWidth=v;selected.style.borderStyle=v?'solid':''});bind('borderColor',v=>{selected.style.borderColor=v;if(!selected.style.borderStyle)selected.style.borderStyle='solid';if(!selected.style.borderWidth)selected.style.borderWidth='1px'});
    bind('boxShadow',v=>selected.style.boxShadow=v);bind('opacity',v=>selected.style.opacity=v===''?'':(Number(v)/100));bind('zIndex',v=>selected.style.zIndex=v);
    bind('objectFit',v=>selected.style.objectFit=v);
    document.querySelector('#boldToggle').onclick=()=>{if(!selected)return;snapshot();const isBold=getComputedStyle(selected).fontWeight>=700;selected.style.fontWeight=isBold?'400':'700'};
    document.querySelector('#italicToggle').onclick=()=>{if(!selected)return;snapshot();const isItalic=getComputedStyle(selected).fontStyle==='italic';selected.style.fontStyle=isItalic?'normal':'italic'};
    bind('display',v=>selected.style.display=v);bind('columns',v=>{selected.style.display='grid';selected.style.gridTemplateColumns=v});bind('gap',v=>selected.style.gap=v);
    bind('flexDirection',v=>selected.style.flexDirection=v);bind('justifyContent',v=>selected.style.justifyContent=v);bind('alignItems',v=>selected.style.alignItems=v);bind('flexWrap',v=>selected.style.flexWrap=v);
    document.querySelector('#freePosition').onclick=()=>{if(!selected)return;snapshot();const parent=selected.parentElement;if(parent&&getComputedStyle(parent).position==='static')parent.style.position='relative';const rect=selected.getBoundingClientRect(),prect=parent.getBoundingClientRect();selected.style.position='absolute';selected.style.left=(rect.left-prect.left)+'px';selected.style.top=(rect.top-prect.top)+'px';selected.style.margin='0'};
    document.querySelector('#normalPosition').onclick=()=>{if(!selected)return;snapshot();selected.style.position='';selected.style.left='';selected.style.top='';selected.style.margin=''};
    document.querySelector('#move').onclick=()=>{moving=!moving;move.textContent=moving?'移動中':'ドラッグ移動'};
    document.querySelector('#resize').onclick=()=>{if(!selected)return;snapshot();selected.style.resize='both';selected.style.overflow='auto'};
    document.querySelector('#undo').onclick=()=>{const h=history.pop();if(h){h.el.innerHTML=h.html;h.el.style.cssText=h.style}};
    document.querySelector('#duplicate').onclick=()=>{if(!selected)return;snapshot();selected.after(selected.cloneNode(true))};
    function doRemove(){if(!selected)return;snapshot();clearHandles();const next=selected.parentElement;selected.remove();selected=next;if(selected)attachHandles()}
    document.querySelector('#remove').onclick=doRemove;
    document.querySelector('#selectNavigation').onclick=()=>selectElement(frame.contentDocument.querySelector('.nav'));
    document.querySelector('#selectPageBackground').onclick=()=>selectElement(frame.contentDocument.body);
    document.querySelector('#addNav').onclick=()=>{const d=frame.contentDocument,id=prompt('移動先ページID（例: home）','home');if(!id)return;const tab=d.createElement('button');tab.className='nav-tab';tab.textContent='新しいページ';tab.setAttribute('onclick',`showPage('${id}')`);d.querySelector('.nav-tabs').append(tab);renderNavEditor()};
    document.querySelectorAll('[data-add]').forEach(b=>b.onclick=()=>{const d=frame.contentDocument,target=selected||d.body,type=b.dataset.add;snapshot();if(type==='text')target.insertAdjacentHTML('beforeend','<div style="padding:16px;font-size:28px">新しい文字</div>');if(type==='section')target.insertAdjacentHTML('beforeend','<section style="min-height:240px;padding:32px"></section>');if(type==='link')target.insertAdjacentHTML('beforeend','<a href="https://" style="display:inline-block;padding:10px;color:inherit">新しいリンク</a>');if(type==='image'||type==='video'){file.accept=type==='image'?'image/*':'video/*';file.dataset.type=type;file.click()}});
    file.onchange=()=>{const f=file.files[0];if(!f)return;const r=new FileReader();r.onload=()=>{const target=selected||frame.contentDocument.body;if(file.dataset.type==='image')target.insertAdjacentHTML('beforeend',`<img src="${r.result}" style="max-width:100%">`);else target.insertAdjacentHTML('beforeend',`<video src="${r.result}" controls style="max-width:100%"></video>`)};r.readAsDataURL(f)};
    function isDangerousUrl(url){
      if(!url) return false;
      const v = String(url).trim();
      return /^file:/i.test(v) || /^javascript:/i.test(v) || /^[a-zA-Z]:[\\/]/.test(v) || v.startsWith('\\\\') || v.startsWith('C:\\') || /^about:/i.test(v);
    }
    function sanitizedClone(d){
      const clone = d.documentElement.cloneNode(true);
      clone.querySelectorAll('[href]').forEach(el=>{ if(isDangerousUrl(el.getAttribute('href'))) el.setAttribute('href','#') });
      clone.querySelectorAll('[src]').forEach(el=>{ if(isDangerousUrl(el.getAttribute('src'))) el.removeAttribute('src') });
      clone.querySelectorAll('[style]').forEach(el=>{
        let style = el.getAttribute('style') || '';
        style = style.replace(/outline:[^;]+;?/gi, '');
        style = style.replace(/background-image:\s*url\((['"]?)([^)'"]+)\1\)/gi, (m, _q, url) => isDangerousUrl(url) ? '' : m);
        if(style.trim()) el.setAttribute('style', style); else el.removeAttribute('style');
      });
      return clone;
    }
    document.querySelector('#publish').onclick=async()=>{
      const d=frame.contentDocument;
      clearHandles();
      const clone=sanitizedClone(d);
      attachHandles();
      const html='<!doctype html>\n'+clone.outerHTML;
      const r=await fetch('/api/content',{method:'PUT',headers:{'content-type':'application/json'},body:JSON.stringify({html})});
      if(!r.ok){alert('保存に失敗しました');return}
      const check=await fetch('/preview?t='+Date.now());
      const checkHtml=await check.text();
      const looksHealthy = checkHtml.includes('function showPage') && checkHtml.includes('id="page-home"') && checkHtml.includes('class="nav"');
      if(!looksHealthy){
        alert('公開しましたが、内容に問題がある可能性があります。表示が壊れていたら「初期状態に戻す」を押してください。');
      } else {
        alert('公開しました');
      }
    };
    document.querySelector('#reset').onclick=async()=>{
      if(!confirm('編集内容をすべて破棄して、初期状態（base.html）に戻します。よろしいですか？'))return;
      const r=await fetch('/api/reset-content',{method:'POST'});
      if(r.ok){
        alert('初期状態に戻しました');
        frame.src='/preview?t='+Date.now();
      } else {
        alert('リセットに失敗しました');
      }
    };
  </script>

<script>
(function () {
  const TOOL_ID = "txoExtraEditorTools";
  const POS_KEY = "txo_helper_position_final_v1";
  const DRAFT_KEY = "txo_editor_draft_html_v1";
  const STYLE_ID = "txoAnimStylesPersist";

  let selectedElement = null;

  const EFFECT_CLASSES = [
    "txo-anim-breathe",
    "txo-anim-flash",
    "txo-anim-slide",
    "txo-anim-float",
    "txo-anim-glow",
    "txo-anim-shake",
    "txo-anim-ticker"
  ];

  const EFFECT_CSS = `
.txo-anim-breathe {
  animation: txoBreathe var(--txo-anim-speed, 2s) ease-in-out infinite !important;
  transform-origin: center center !important;
}
@keyframes txoBreathe {
  0%, 100% { transform: scale(1); }
  50% { transform: scale(1.08); }
}

.txo-anim-flash {
  animation: txoFlash var(--txo-anim-speed, 1s) step-end infinite !important;
}
@keyframes txoFlash {
  0%, 49% { opacity: 1; }
  50%, 100% { opacity: 0.25; }
}

.txo-anim-slide {
  display: inline-block !important;
  animation: txoSlide var(--txo-anim-speed, 2s) ease-in-out infinite alternate !important;
}
@keyframes txoSlide {
  0% { transform: translateX(0); }
  100% { transform: translateX(32px); }
}

.txo-anim-float {
  display: inline-block !important;
  animation: txoFloat var(--txo-anim-speed, 2.4s) ease-in-out infinite !important;
}
@keyframes txoFloat {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-10px); }
}

.txo-anim-glow {
  animation: txoGlow var(--txo-anim-speed, 1.8s) ease-in-out infinite alternate !important;
}
@keyframes txoGlow {
  0% {
    text-shadow: 0 0 0 transparent;
    filter: drop-shadow(0 0 0 transparent);
  }
  100% {
    text-shadow: 0 0 14px currentColor;
    filter: drop-shadow(0 0 10px currentColor);
  }
}

.txo-anim-shake {
  display: inline-block !important;
  animation: txoShake var(--txo-anim-speed, .35s) linear infinite !important;
}
@keyframes txoShake {
  0%, 100% { transform: translateX(0); }
  25% { transform: translateX(-3px); }
  75% { transform: translateX(3px); }
}

.txo-anim-ticker {
  display: inline-block !important;
  animation: txoTicker var(--txo-anim-speed, 4s) ease-in-out infinite alternate !important;
  white-space: nowrap !important;
}
@keyframes txoTicker {
  0% { transform: translateX(-28px); }
  100% { transform: translateX(28px); }
}
`;

  const oldPanel = document.getElementById(TOOL_ID);
  if (oldPanel) oldPanel.remove();

  const oldShield = document.getElementById("txoDragShield");
  if (oldShield) oldShield.remove();

  const shield = document.createElement("div");
  shield.id = "txoDragShield";
  document.body.appendChild(shield);

  function makePanel() {
    const panel = document.createElement("div");
    panel.id = TOOL_ID;

    panel.innerHTML = `
      <div id="txoExtraHeader">
        <span id="txoDragHandle">↕ 移動</span>
        <span id="txoHelperTitle">編集補助</span>
        <span id="txoHeaderBtns">
          <button type="button" id="txoMiniBtn">小さく</button>
          <button type="button" id="txoCloseBtn">×</button>
        </span>
      </div>

      <div id="txoMovePad">
        <span></span>
        <button type="button" data-move="up">↑</button>
        <span></span>
        <button type="button" data-move="left">←</button>
        <button type="button" data-move="reset">戻す</button>
        <button type="button" data-move="right">→</button>
        <span></span>
        <button type="button" data-move="down">↓</button>
        <span></span>
      </div>

      <div class="txoPanelSection">
        <div class="txoPanelSectionTitle">選択</div>
        <button type="button" id="txoPickModeBtn" style="width:100%;">次にクリックした要素を選択</button>
        <div id="txoSelectedStatus">未選択</div>
      </div>

      <input id="txoFontInput" type="text" placeholder="フォント名を入力 例: Noto Sans JP">

      <div class="txoRow">
        <button type="button" id="txoApplyFontBtn">フォント反映</button>
      </div>

      <div class="txoRow">
        <button type="button" id="txoSaveDraftBtn">保存</button>
        <button type="button" id="txoLoadDraftBtn">読込</button>
        <button type="button" id="txoClearDraftBtn">削除</button>
      </div>

      <div class="txoPanelSection">
        <div class="txoPanelSectionTitle">エフェクト</div>

        <select id="txoEffectSelect">
          <option value="none">なし</option>
          <option value="breathe">呼吸</option>
          <option value="flash">フラッシュ</option>
          <option value="slide">左右に動く</option>
          <option value="float">上下にふわふわ</option>
          <option value="glow">光る</option>
          <option value="shake">ブルブル</option>
          <option value="ticker">流れる文字風</option>
        </select>

        <select id="txoEffectSpeed">
          <option value="3.5s">ゆっくり</option>
          <option value="2s" selected>普通</option>
          <option value="0.8s">速い</option>
          <option value="0.35s">かなり速い</option>
        </select>

        <div class="txoRow">
          <button type="button" id="txoApplyEffectBtn">反映</button>
          <button type="button" id="txoRemoveEffectBtn">解除</button>
        </div>
      </div>

      <div id="txoLinkStatus">リンクなし</div>

      <div id="txoHelpText">
        移動できない原因はiframeです。今回からドラッグ中だけ透明の板を出して、マウスを奪われないようにしています。
      </div>
    `;

    document.body.appendChild(panel);
    return panel;
  }

  const panel = makePanel();

  function getFrame() {
    return document.querySelector("iframe");
  }

  function getEditorDocument() {
    const frame = getFrame();
    if (frame && frame.contentDocument) return frame.contentDocument;
    return document;
  }

  function getEditableRoot() {
    const doc = getEditorDocument();

    return (
      doc.querySelector("[data-editor-root]") ||
      doc.querySelector("#editor-root") ||
      doc.querySelector("#canvas") ||
      doc.querySelector(".canvas") ||
      doc.querySelector("[contenteditable='true']") ||
      doc.body
    );
  }

  function loadPosition() {
    try {
      const saved = JSON.parse(localStorage.getItem(POS_KEY) || "null");
      if (saved && typeof saved.left === "number" && typeof saved.top === "number") {
        panel.style.left = saved.left + "px";
        panel.style.top = saved.top + "px";
      }
    } catch (e) {}
  }

  function savePosition() {
    const r = panel.getBoundingClientRect();
    localStorage.setItem(POS_KEY, JSON.stringify({
      left: r.left,
      top: r.top
    }));
  }

  function clamp(left, top) {
    const maxLeft = Math.max(8, window.innerWidth - panel.offsetWidth - 8);
    const maxTop = Math.max(8, window.innerHeight - panel.offsetHeight - 8);
    return {
      left: Math.min(Math.max(8, left), maxLeft),
      top: Math.min(Math.max(8, top), maxTop)
    };
  }

  function setPanelPosition(left, top) {
    const p = clamp(left, top);
    panel.style.left = p.left + "px";
    panel.style.top = p.top + "px";
    panel.style.right = "auto";
    panel.style.bottom = "auto";
    savePosition();
  }

  loadPosition();

  let dragging = false;
  let startX = 0;
  let startY = 0;
  let startLeft = 0;
  let startTop = 0;

  function startDrag(e) {
    dragging = true;

    startX = e.clientX;
    startY = e.clientY;

    const r = panel.getBoundingClientRect();
    startLeft = r.left;
    startTop = r.top;

    shield.style.display = "block";
    document.body.style.userSelect = "none";

    e.preventDefault();
    e.stopPropagation();
  }

  function moveDrag(e) {
    if (!dragging) return;

    setPanelPosition(
      startLeft + e.clientX - startX,
      startTop + e.clientY - startY
    );

    e.preventDefault();
    e.stopPropagation();
  }

  function stopDrag(e) {
    if (!dragging) return;

    dragging = false;
    shield.style.display = "none";
    document.body.style.userSelect = "";
    savePosition();

    if (e) {
      e.preventDefault();
      e.stopPropagation();
    }
  }

  document.getElementById("txoDragHandle").addEventListener("mousedown", startDrag, true);
  shield.addEventListener("mousemove", moveDrag, true);
  shield.addEventListener("mouseup", stopDrag, true);
  window.addEventListener("mouseup", stopDrag, true);

  document.querySelectorAll("#txoMovePad button").forEach(btn => {
    btn.addEventListener("click", function () {
      const r = panel.getBoundingClientRect();
      const type = btn.dataset.move;
      const step = 40;

      if (type === "up") setPanelPosition(r.left, r.top - step);
      if (type === "down") setPanelPosition(r.left, r.top + step);
      if (type === "left") setPanelPosition(r.left - step, r.top);
      if (type === "right") setPanelPosition(r.left + step, r.top);
      if (type === "reset") {
        panel.classList.remove("txo-mini");
        setPanelPosition(24, 170);
      }
    });
  });

  document.getElementById("txoMiniBtn").addEventListener("click", function () {
    panel.classList.toggle("txo-mini");
    this.textContent = panel.classList.contains("txo-mini") ? "開く" : "小さく";
    savePosition();
  });

  document.getElementById("txoCloseBtn").addEventListener("click", function () {
    const r = panel.getBoundingClientRect();
    panel.classList.add("txo-hidden");

    let showBtn = document.getElementById("txoShowHelperBtn");
    if (!showBtn) {
      showBtn = document.createElement("button");
      showBtn.id = "txoShowHelperBtn";
      showBtn.textContent = "編集補助";
      document.body.appendChild(showBtn);
    }

    showBtn.style.left = r.left + "px";
    showBtn.style.top = r.top + "px";

    showBtn.onclick = function () {
      panel.classList.remove("txo-hidden");
      showBtn.remove();
    };
  });

  function clearSelectedOutline() {
    const doc = getEditorDocument();
    doc.querySelectorAll(".txo-selected-element").forEach(el => {
      el.classList.remove("txo-selected-element");
    });
  }

  function setSelectedElement(el) {
    if (!el) return;

    const doc = getEditorDocument();

    if (el === doc.body || el === doc.documentElement) return;

    clearSelectedOutline();

    selectedElement = el;
    selectedElement.classList.add("txo-selected-element");

    updateSelectedStatus();
    updateLinkStatus();
  }

  function updateSelectedStatus() {
    const status = document.getElementById("txoSelectedStatus");
    if (!status) return;

    if (!selectedElement) {
      status.textContent = "未選択";
      return;
    }

    const tag = selectedElement.tagName ? selectedElement.tagName.toLowerCase() : "element";
    const text = (selectedElement.innerText || selectedElement.textContent || "").trim().replace(/\s+/g, " ");
    status.textContent = "選択中: " + tag + (text ? " / " + text.slice(0, 24) : "");
  }

  function findLinkElement(el) {
    if (!el) return null;
    if (el.tagName && el.tagName.toLowerCase() === "a") return el;
    return el.closest ? el.closest("a") : null;
  }

  function updateLinkStatus() {
    const status = document.getElementById("txoLinkStatus");
    if (!status) return;

    const link = findLinkElement(selectedElement);

    if (link && link.getAttribute("href")) {
      status.textContent = "リンクあり: " + link.getAttribute("href");
    } else {
      status.textContent = "リンクなし";
    }
  }

  let pickMode = false;

  document.getElementById("txoPickModeBtn").addEventListener("click", function () {
    pickMode = true;
    this.textContent = "選択したい文字/画像をクリック";
    this.style.background = "#0b5c4d";
  });

  function setupEditorEvents() {
    const doc = getEditorDocument();
    if (doc.__txoFinalHelperReady) return;
    doc.__txoFinalHelperReady = true;

    doc.addEventListener("click", function (e) {
      if (!e.target || !e.target.tagName) return;

      const tag = e.target.tagName.toLowerCase();
      if (tag === "body" || tag === "html") return;

      setSelectedElement(e.target);

      if (pickMode) {
        pickMode = false;
        const btn = document.getElementById("txoPickModeBtn");
        if (btn) {
          btn.textContent = "次にクリックした要素を選択";
          btn.style.background = "";
        }
      }
    }, true);

    doc.addEventListener("keydown", function (e) {
      if (e.key !== "Backspace" && e.key !== "Delete") return;

      const active = doc.activeElement;
      const typing =
        active &&
        (
          active.tagName === "INPUT" ||
          active.tagName === "TEXTAREA" ||
          active.isContentEditable
        );

      if (typing) return;
      if (!selectedElement) return;

      e.preventDefault();

      if (confirm("選択中の要素を削除しますか？")) {
        selectedElement.remove();
        selectedElement = null;
        updateSelectedStatus();
        updateLinkStatus();
      }
    }, true);
  }

  function ensureEffectStyle() {
    const doc = getEditorDocument();

    let style = doc.getElementById(STYLE_ID);

    if (!style) {
      style = doc.createElement("style");
      style.id = STYLE_ID;
      style.textContent = EFFECT_CSS;

      if (doc.head) {
        doc.head.appendChild(style);
      } else {
        doc.body.appendChild(style);
      }
    } else {
      style.textContent = EFFECT_CSS;
    }
  }

  function clearEffects(el) {
    if (!el) return;

    EFFECT_CLASSES.forEach(cls => {
      el.classList.remove(cls);
    });

    el.removeAttribute("data-txo-effect");
    el.style.removeProperty("--txo-anim-speed");
  }

  function applyEffect() {
    if (!selectedElement) {
      alert("先に「次にクリックした要素を選択」を押して、エフェクトを付けたい文字や画像をクリックしてください。");
      return;
    }

    const effect = document.getElementById("txoEffectSelect").value;
    const speed = document.getElementById("txoEffectSpeed").value;

    ensureEffectStyle();
    clearEffects(selectedElement);

    if (effect === "none") {
      alert("エフェクトを解除しました。");
      return;
    }

    selectedElement.classList.add("txo-anim-" + effect);
    selectedElement.setAttribute("data-txo-effect", effect);
    selectedElement.style.setProperty("--txo-anim-speed", speed);

    alert("エフェクトを反映しました。");
  }

  function removeEffect() {
    if (!selectedElement) {
      alert("先に解除したい要素を選択してください。");
      return;
    }

    clearEffects(selectedElement);
    alert("エフェクトを解除しました。");
  }

  document.getElementById("txoApplyEffectBtn").addEventListener("click", applyEffect);
  document.getElementById("txoRemoveEffectBtn").addEventListener("click", removeEffect);

  function loadGoogleFont(fontName) {
    const name = String(fontName || "").trim();
    if (!name) return;

    const id = "txo-google-font-" + name.replace(/[^a-zA-Z0-9]/g, "-");
    if (document.getElementById(id)) return;

    const link = document.createElement("link");
    link.id = id;
    link.rel = "stylesheet";
    link.href = "https://fonts.googleapis.com/css2?family=" + encodeURIComponent(name).replace(/%20/g, "+") + ":wght@300;400;500;600;700&display=swap";
    document.head.appendChild(link);
  }

  document.getElementById("txoApplyFontBtn").addEventListener("click", function () {
    const fontName = document.getElementById("txoFontInput").value.trim();

    if (!fontName) {
      alert("フォント名を入力してください。例: Noto Sans JP");
      return;
    }

    loadGoogleFont(fontName);

    const target = selectedElement || getEditableRoot();
    target.style.fontFamily = "'" + fontName + "', sans-serif";

    alert("フォントを反映しました: " + fontName);
  });

  document.getElementById("txoSaveDraftBtn").addEventListener("click", function () {
    const root = getEditableRoot();
    localStorage.setItem(DRAFT_KEY, root.innerHTML);
    alert("下書きを保存しました。");
  });

  document.getElementById("txoLoadDraftBtn").addEventListener("click", function () {
    const saved = localStorage.getItem(DRAFT_KEY);

    if (!saved) {
      alert("保存された下書きがありません。");
      return;
    }

    if (!confirm("保存した下書きを読み込みますか？ 今の編集内容は上書きされます。")) return;

    const root = getEditableRoot();
    root.innerHTML = saved;

    selectedElement = null;
    updateSelectedStatus();
    updateLinkStatus();
    ensureEffectStyle();

    alert("下書きを読み込みました。");
  });

  document.getElementById("txoClearDraftBtn").addEventListener("click", function () {
    if (!confirm("保存した下書きを削除しますか？")) return;
    localStorage.removeItem(DRAFT_KEY);
    alert("下書きを削除しました。");
  });

  setupEditorEvents();
  ensureEffectStyle();
  updateSelectedStatus();
  updateLinkStatus();

  const frame = getFrame();
  if (frame) {
    frame.addEventListener("load", function () {
      setTimeout(function () {
        setupEditorEvents();
        ensureEffectStyle();
        updateSelectedStatus();
        updateLinkStatus();
      }, 300);
    });
  }
})();

<style>
  #txoExtraEditorTools {
    position: fixed !important;
    right: auto !important;
    bottom: auto !important;
    transform: none !important;
    z-index: 2147483647 !important;
  }

  #txoDragHandle {
    cursor: move !important;
    user-select: none !important;
    touch-action: none !important;
  }

  #txoExtraHeader {
    cursor: move !important;
    user-select: none !important;
    touch-action: none !important;
  }

  #txoExtraHeader button {
    cursor: pointer !important;
  }
</style>

<script>
(function () {
  const POS_KEY = "txo_helper_hard_drag_position_v1";

  function installHardDrag() {
    const panel = document.getElementById("txoExtraEditorTools");
    const oldHandle = document.getElementById("txoDragHandle");
    const header = document.getElementById("txoExtraHeader");

    if (!panel || !oldHandle || !header) return false;

    if (panel.dataset.hardDragReady === "1") return true;
    panel.dataset.hardDragReady = "1";

    // 古いイベントを外すため、移動ボタンを作り直す
    const handle = oldHandle.cloneNode(true);
    oldHandle.replaceWith(handle);

    const oldShield = document.getElementById("txoDragShield");
    if (oldShield) oldShield.remove();

    function forcePosition(left, top) {
      const maxLeft = Math.max(8, window.innerWidth - panel.offsetWidth - 8);
      const maxTop = Math.max(8, window.innerHeight - panel.offsetHeight - 8);

      const nextLeft = Math.min(Math.max(8, left), maxLeft);
      const nextTop = Math.min(Math.max(8, top), maxTop);

      panel.style.setProperty("position", "fixed", "important");
      panel.style.setProperty("left", nextLeft + "px", "important");
      panel.style.setProperty("top", nextTop + "px", "important");
      panel.style.setProperty("right", "auto", "important");
      panel.style.setProperty("bottom", "auto", "important");
      panel.style.setProperty("transform", "none", "important");

      localStorage.setItem(POS_KEY, JSON.stringify({
        left: nextLeft,
        top: nextTop
      }));
    }

    try {
      const saved = JSON.parse(localStorage.getItem(POS_KEY) || "null");
      if (saved && typeof saved.left === "number" && typeof saved.top === "number") {
        forcePosition(saved.left, saved.top);
      } else {
        const r = panel.getBoundingClientRect();
        forcePosition(r.left || 24, r.top || 170);
      }
    } catch (e) {
      const r = panel.getBoundingClientRect();
      forcePosition(r.left || 24, r.top || 170);
    }

    let dragging = false;
    let startX = 0;
    let startY = 0;
    let startLeft = 0;
    let startTop = 0;
    let iframeStates = [];

    function disableIframes() {
      iframeStates = Array.from(document.querySelectorAll("iframe")).map(frame => {
        return {
          frame,
          old: frame.style.pointerEvents
        };
      });

      iframeStates.forEach(item => {
        item.frame.style.setProperty("pointer-events", "none", "important");
      });
    }

    function restoreIframes() {
      iframeStates.forEach(item => {
        item.frame.style.pointerEvents = item.old || "";
      });

      iframeStates = [];
    }

    function getPoint(e) {
      if (e.touches && e.touches[0]) return e.touches[0];
      return e;
    }

    function startDrag(e) {
      const target = e.target;

      // 小さく、×、戻すなどのボタンはドラッグ対象外
      if (target && target.closest && target.closest("button") && target.id !== "txoDragHandle") {
        return;
      }

      const point = getPoint(e);
      const r = panel.getBoundingClientRect();

      dragging = true;
      startX = point.clientX;
      startY = point.clientY;
      startLeft = r.left;
      startTop = r.top;

      disableIframes();

      document.body.style.userSelect = "none";
      document.body.style.cursor = "move";

      document.addEventListener("mousemove", moveDrag, true);
      document.addEventListener("mouseup", stopDrag, true);
      window.addEventListener("mousemove", moveDrag, true);
      window.addEventListener("mouseup", stopDrag, true);

      document.addEventListener("touchmove", moveDrag, { capture: true, passive: false });
      document.addEventListener("touchend", stopDrag, true);

      e.preventDefault();
      e.stopPropagation();

      if (e.stopImmediatePropagation) e.stopImmediatePropagation();

      return false;
    }

    function moveDrag(e) {
      if (!dragging) return;

      const point = getPoint(e);

      forcePosition(
        startLeft + point.clientX - startX,
        startTop + point.clientY - startY
      );

      e.preventDefault();
      e.stopPropagation();

      if (e.stopImmediatePropagation) e.stopImmediatePropagation();

      return false;
    }

    function stopDrag(e) {
      if (!dragging) return;

      dragging = false;

      restoreIframes();

      document.body.style.userSelect = "";
      document.body.style.cursor = "";

      document.removeEventListener("mousemove", moveDrag, true);
      document.removeEventListener("mouseup", stopDrag, true);
      window.removeEventListener("mousemove", moveDrag, true);
      window.removeEventListener("mouseup", stopDrag, true);

      document.removeEventListener("touchmove", moveDrag, true);
      document.removeEventListener("touchend", stopDrag, true);

      if (e) {
        e.preventDefault();
        e.stopPropagation();
        if (e.stopImmediatePropagation) e.stopImmediatePropagation();
      }

      return false;
    }

    // 「↕ 移動」でも、上のバー全体でもドラッグできる
    handle.addEventListener("mousedown", startDrag, true);
    handle.addEventListener("touchstart", startDrag, { capture: true, passive: false });

    header.addEventListener("mousedown", startDrag, true);
    header.addEventListener("touchstart", startDrag, { capture: true, passive: false });

    // 戻すボタンを押したら見える位置へ戻す
    const resetBtn = document.querySelector('[data-move="reset"]');
    if (resetBtn) {
      resetBtn.addEventListener("click", function () {
        forcePosition(24, 170);
      }, true);
    }

    return true;
  }

  if (!installHardDrag()) {
    let count = 0;
    const timer = setInterval(function () {
      count++;

      if (installHardDrag() || count > 80) {
        clearInterval(timer);
      }
    }, 100);
  }
})();
</script>

<script>
(function () {
  const STYLE_ID = "txoStableResizeUndoStyle";
  const UNDO_LIMIT = 60;

  let undoStack = [];
  let lastSnapshot = "";
  let setupTimer = null;

  function getFrame() {
    return document.querySelector("iframe");
  }

  function getEditorDocument() {
    const frame = getFrame();

    if (frame && frame.contentDocument) {
      return frame.contentDocument;
    }

    return document;
  }

  function getEditableRoot() {
    const doc = getEditorDocument();

    return (
      doc.querySelector("[data-editor-root]") ||
      doc.querySelector("#editor-root") ||
      doc.querySelector("#canvas") ||
      doc.querySelector(".canvas") ||
      doc.querySelector("[contenteditable='true']") ||
      doc.body
    );
  }

  function injectStyle() {
    const doc = getEditorDocument();

    if (!doc || !doc.head) return;

    let style = doc.getElementById(STYLE_ID);

    if (!style) {
      style = doc.createElement("style");
      style.id = STYLE_ID;
      doc.head.appendChild(style);
    }

    style.textContent = `
      .txo-stable-resizable {
        resize: both !important;
        overflow: auto !important;
        min-width: 30px !important;
        min-height: 20px !important;
        max-width: none !important;
        max-height: none !important;
        box-sizing: border-box !important;
      }

      .txo-stable-resizable.txo-selected-element,
      .txo-stable-resizable {
        outline: 2px solid #00e0c5 !important;
        outline-offset: 2px !important;
      }
    `;
  }

  function isInlineTextTag(el) {
    if (!el || !el.tagName) return false;

    const tag = el.tagName.toLowerCase();

    return [
      "span",
      "em",
      "strong",
      "b",
      "i",
      "u",
      "small",
      "mark"
    ].includes(tag);
  }

  function promoteResizeTarget(el) {
    if (!el || !el.tagName) return el;

    const tag = el.tagName.toLowerCase();

    if (tag === "img" || tag === "video" || tag === "iframe" || tag === "button" || tag === "a") {
      return el;
    }

    if (isInlineTextTag(el)) {
      const parentBlock = el.closest("h1,h2,h3,h4,h5,h6,p,div,li,section,article");

      if (parentBlock) {
        return parentBlock;
      }
    }

    return el;
  }

  function clearStableResizable(doc) {
    doc.querySelectorAll(".txo-stable-resizable").forEach(el => {
      el.classList.remove("txo-stable-resizable");
    });
  }

  function enableResize(el) {
    if (!el || !el.tagName) return;

    const doc = getEditorDocument();
    const target = promoteResizeTarget(el);

    if (!target || !target.tagName) return;

    const tag = target.tagName.toLowerCase();

    if (tag === "html" || tag === "body") return;

    clearStableResizable(doc);

    doc.querySelectorAll(".txo-selected-element").forEach(item => {
      item.classList.remove("txo-selected-element");
    });

    target.classList.add("txo-selected-element");
    target.classList.add("txo-stable-resizable");

    const computed = doc.defaultView.getComputedStyle(target);

    if (computed.display === "inline") {
      target.style.display = "inline-block";
    }

    target.style.resize = "both";
    target.style.overflow = "auto";
    target.style.boxSizing = "border-box";
    target.style.maxWidth = "none";
    target.style.maxHeight = "none";

    if (!target.style.minWidth) {
      target.style.minWidth = "30px";
    }

    if (!target.style.minHeight) {
      target.style.minHeight = "20px";
    }
  }

  function getHtmlSnapshot() {
    const root = getEditableRoot();

    if (!root) return "";

    return root.innerHTML;
  }

  function pushUndoSnapshot() {
    const html = getHtmlSnapshot();

    if (!html) return;

    if (html === lastSnapshot) return;

    undoStack.push(html);
    lastSnapshot = html;

    if (undoStack.length > UNDO_LIMIT) {
      undoStack.shift();
    }
  }

  function fallbackUndo() {
    const root = getEditableRoot();

    if (!root) return false;

    const current = getHtmlSnapshot();

    if (undoStack.length === 0) {
      return false;
    }

    if (undoStack[undoStack.length - 1] === current) {
      undoStack.pop();
    }

    const prev = undoStack.pop();

    if (!prev) {
      return false;
    }

    root.innerHTML = prev;
    lastSnapshot = prev;

    setTimeout(setupEditorSide, 100);

    return true;
  }

  function hookUndoButton() {
    const buttons = Array.from(document.querySelectorAll("button"));

    const undoBtn = buttons.find(btn => {
      return (btn.textContent || "").trim() === "1つ戻る";
    });

    if (!undoBtn || undoBtn.dataset.txoUndoFixed === "1") {
      return;
    }

    undoBtn.dataset.txoUndoFixed = "1";

    undoBtn.addEventListener("click", function () {
      const before = getHtmlSnapshot();

      setTimeout(function () {
        const after = getHtmlSnapshot();

        // 元の「1つ戻る」で変化がなかった時だけ、予備の戻るを使う
        if (before === after) {
          const ok = fallbackUndo();

          if (!ok) {
            alert("戻せる履歴がありません。");
          }
        } else {
          pushUndoSnapshot();
        }
      }, 120);
    }, false);
  }

  function setupEditorSide() {
    const doc = getEditorDocument();

    if (!doc || !doc.body) return;

    injectStyle();

    if (!doc.__txoStableResizeUndoReady) {
      doc.__txoStableResizeUndoReady = true;

      doc.addEventListener("click", function (e) {
        if (!e.target || !e.target.tagName) return;

        setTimeout(function () {
          enableResize(e.target);
          pushUndoSnapshot();
        }, 0);
      }, true);

      doc.addEventListener("input", function () {
        pushUndoSnapshot();
      }, true);

      doc.addEventListener("keyup", function () {
        pushUndoSnapshot();
      }, true);

      doc.addEventListener("mouseup", function () {
        pushUndoSnapshot();
      }, true);
    }

    pushUndoSnapshot();
  }

  function removeOldResizeOverlay() {
    const oldOverlay = document.getElementById("txoResizeOverlay");

    if (oldOverlay) {
      oldOverlay.remove();
    }
  }

  function setupAll() {
    removeOldResizeOverlay();
    setupEditorSide();
    hookUndoButton();
  }

  setupAll();

  if (setupTimer) {
    clearInterval(setupTimer);
  }

  setupTimer = setInterval(setupAll, 1000);

  const frame = getFrame();

  if (frame) {
    frame.addEventListener("load", function () {
      setTimeout(setupAll, 300);
    });
  }
})();
</script>

      return selectedImage;
    }

    return null;
  }

  function markImage(img) {
    if (!img || !img.style) return;

    img.setAttribute("data-txo-image-managed", "1");

    if (!img.style.maxWidth) {
      img.style.maxWidth = "100%";
    }

    if (!img.style.height) {
      img.style.height = "auto";
    }

    if (!img.style.objectFit) {
      img.style.objectFit = "contain";
    }

    if (!img.style.display) {
      img.style.display = "block";
    }
  }

  function setupImageClickSelect() {
    const doc = getEditorDocument();

    if (!doc || doc.__txoImageAutoSizeReady) return;

    doc.__txoImageAutoSizeReady = true;

    doc.addEventListener("click", function (e) {
      if (!e.target || !e.target.tagName) return;

      const tag = e.target.tagName.toLowerCase();

      if (tag === "img") {
        selectedImage = e.target;
        markImage(selectedImage);
      } else {
        const img = e.target.querySelector && e.target.querySelector("img");

        if (img) {
          selectedImage = img;
          markImage(selectedImage);
        }
      }
    }, true);
  }

  function setupAutoImageObserver() {
    const root = getEditableRoot();

    if (!root) return;

    if (imageObserver) {
      imageObserver.disconnect();
      imageObserver = null;
    }

    imageObserver = new MutationObserver(function (mutations) {
      mutations.forEach(function (mutation) {
        mutation.addedNodes.forEach(function (node) {
          if (!node || !node.tagName) return;

          if (node.tagName.toLowerCase() === "img") {
            markImage(node);
          }

          if (node.querySelectorAll) {
            node.querySelectorAll("img").forEach(markImage);
          }
        });
      });
    });

    imageObserver.observe(root, {
      childList: true,
      subtree: true
    });
  }

  function getImageOrAlert() {
    const img = findSelectedImage();

    if (!img) {
      alert("先にサイズ変更したい画像をクリックしてください。");
      return null;
    }

    markImage(img);
    return img;
  }

  function clearImageSizeMode(img) {
    img.classList.remove("txo-image-auto-width");
    img.classList.remove("txo-image-fit-frame");
    img.classList.remove("txo-image-cover-frame");
    img.classList.remove("txo-image-free-size");
  }

  function imageAutoWidth() {
    const img = getImageOrAlert();
    if (!img) return;

    clearImageSizeMode(img);

    img.style.width = "100%";
    img.style.height = "auto";
    img.style.maxWidth = "100%";
    img.style.objectFit = "contain";
    img.style.display = "block";

    img.setAttribute("data-txo-image-size", "auto-width");

    alert("画像をレイアウト幅に自動調整しました。");
  }

  function imageFitFrame() {
    const img = getImageOrAlert();
    if (!img) return;

    clearImageSizeMode(img);

    const parent = img.parentElement;

    if (parent) {
      parent.style.overflow = "hidden";

      const parentRect = parent.getBoundingClientRect();

      if (parentRect.height < 30) {
        parent.style.minHeight = img.getBoundingClientRect().height + "px";
      }
    }

    img.style.width = "100%";
    img.style.height = "100%";
    img.style.maxWidth = "100%";
    img.style.objectFit = "contain";
    img.style.display = "block";

    img.setAttribute("data-txo-image-size", "fit-frame");

    alert("画像を枠内に全体表示で合わせました。");
  }

  function imageCoverFrame() {
    const img = getImageOrAlert();
    if (!img) return;

    clearImageSizeMode(img);

    const parent = img.parentElement;

    if (parent) {
      parent.style.overflow = "hidden";

      const parentRect = parent.getBoundingClientRect();

      if (parentRect.height < 30) {
        parent.style.minHeight = img.getBoundingClientRect().height + "px";
      }
    }

    img.style.width = "100%";
    img.style.height = "100%";
    img.style.maxWidth = "100%";
    img.style.objectFit = "cover";
    img.style.display = "block";

    img.setAttribute("data-txo-image-size", "cover-frame");

    alert("画像を枠いっぱいに表示しました。端は少し切れる場合があります。");
  }

  function imageFreeSize() {
    const img = getImageOrAlert();
    if (!img) return;

    const rect = img.getBoundingClientRect();

    const width = prompt(
      "画像の幅を入力してください。\n例: 300px / 50% / auto",
      img.style.width || Math.round(rect.width) + "px"
    );

    if (width === null) return;

    const height = prompt(
      "画像の高さを入力してください。\n例: 200px / auto",
      img.style.height || "auto"
    );

    if (height === null) return;

    clearImageSizeMode(img);

    img.style.width = width.trim() || "auto";
    img.style.height = height.trim() || "auto";
    img.style.maxWidth = "none";
    img.style.objectFit = "contain";
    img.style.display = "block";

    img.setAttribute("data-txo-image-size", "free");

    alert("画像サイズを変更しました。");
  }

  function addImageButtons() {
    if (document.getElementById("txoImageAutoWidthBtn")) return;

    const buttons = Array.from(document.querySelectorAll("button"));

    const imageAddBtn = buttons.find(btn => {
      return (btn.textContent || "").trim() === "画像追加";
    });

    const publishBtn = buttons.find(btn => {
      return (btn.textContent || "").trim() === "公開";
    });

    const area =
      imageAddBtn && imageAddBtn.parentElement
        ? imageAddBtn.parentElement
        : publishBtn && publishBtn.parentElement
          ? publishBtn.parentElement
          : document.body;

    function makeBtn(id, text, className, onClick) {
      const btn = document.createElement("button");
      btn.id = id;
      btn.type = "button";
      btn.className = "txo-image-size-btn " + (className || "");
      btn.textContent = text;
      btn.addEventListener("click", onClick);
      return btn;
    }

    const autoBtn = makeBtn(
      "txoImageAutoWidthBtn",
      "画像 全幅",
      "",
      imageAutoWidth
    );

    const fitBtn = makeBtn(
      "txoImageFitFrameBtn",
      "画像 枠に合わせる",
      "",
      imageFitFrame
    );

    const coverBtn = makeBtn(
      "txoImageCoverFrameBtn",
      "画像 枠いっぱい",
      "txo-image-size-cover-btn",
      imageCoverFrame
    );

    const freeBtn = makeBtn(
      "txoImageFreeSizeBtn",
      "画像 自由サイズ",
      "txo-image-size-free-btn",
      imageFreeSize
    );

    if (imageAddBtn && imageAddBtn.nextSibling) {
      area.insertBefore(freeBtn, imageAddBtn.nextSibling);
      area.insertBefore(coverBtn, freeBtn);
      area.insertBefore(fitBtn, coverBtn);
      area.insertBefore(autoBtn, fitBtn);
    } else {
      area.appendChild(autoBtn);
      area.appendChild(fitBtn);
      area.appendChild(coverBtn);
      area.appendChild(freeBtn);
    }
  }

  function setupAll() {
    addImageButtons();
    setupImageClickSelect();
    setupAutoImageObserver();

    const root = getEditableRoot();

    if (root && root.querySelectorAll) {
      root.querySelectorAll("img").forEach(function (img) {
        if (img.getAttribute("data-txo-image-managed") === "1") return;
        markImage(img);
      });
    }
  }

  if (document.readyState === "loading") {
    document.addEventListener("DOMContentLoaded", setupAll);
  } else {
    setupAll();
  }

  setTimeout(setupAll, 500);
  setTimeout(setupAll, 1500);

  const frame = getFrame();

  if (frame) {
    frame.addEventListener("load", function () {
      setTimeout(setupAll, 300);
    });
  }
})();
</script>

<script>
(function () {
  let selectedElement = null;

  function getFrame() {
    return document.querySelector("iframe");
  }

  function getEditorDocument() {
    const frame = getFrame();

    if (frame && frame.contentDocument) {
      return frame.contentDocument;
    }

    return document;
  }

  function getEditableRoot() {
    const doc = getEditorDocument();

    return (
      doc.querySelector("[data-editor-root]") ||
      doc.querySelector("#editor-root") ||
      doc.querySelector("#canvas") ||
      doc.querySelector(".canvas") ||
      doc.querySelector("[contenteditable='true']") ||
      doc.body
    );
  }

  function clearOwnSelection() {
    const doc = getEditorDocument();

    doc.querySelectorAll(".txo-bg-z-selected").forEach(el => {
      el.classList.remove("txo-bg-z-selected");
    });
  }

  function selectElement(el) {
    if (!el || !el.tagName) return;

    const tag = el.tagName.toLowerCase();

    if (tag === "html" || tag === "body") return;

    clearOwnSelection();

    selectedElement = el;
    selectedElement.classList.add("txo-bg-z-selected");
  }

  function setupSelection() {
    const doc = getEditorDocument();

    if (!doc || doc.__txoBackgroundZindexReady) return;

    doc.__txoBackgroundZindexReady = true;

    doc.addEventListener("click", function (e) {
      if (!e.target || !e.target.tagName) return;
      selectElement(e.target);
    }, true);
  }

  function getSelectedOrAlert() {
    if (selectedElement) {
      const doc = getEditorDocument();

      if (doc.body.contains(selectedElement)) {
        return selectedElement;
      }
    }

    const doc = getEditorDocument();
    const existingSelected =
      doc.querySelector(".txo-selected-element") ||
      doc.querySelector("[data-selected='true']") ||
      doc.querySelector(".selected");

    if (existingSelected) {
      selectedElement = existingSelected;
      return selectedElement;
    }

    alert("先に画像・文字・枠などをクリックして選択してください。");
    return null;
  }

  function findBackgroundTarget() {
    const root = getEditableRoot();

    if (!selectedElement) {
      return root;
    }

    const tag = selectedElement.tagName
      ? selectedElement.tagName.toLowerCase()
      : "";

    if (tag === "img") {
      return (
        selectedElement.closest("section, article, header, footer, main, div") ||
        selectedElement.parentElement ||
        root
      );
    }

    if (["section", "article", "header", "footer", "main", "div"].includes(tag)) {
      return selectedElement;
    }

    return (
      selectedElement.closest("section, article, header, footer, main, div") ||
      selectedElement.parentElement ||
      root
    );
  }

  function applyBackgroundUrl(url) {
    const target = findBackgroundTarget();

    if (!target) {
      alert("背景を入れる対象が見つかりません。");
      return;
    }

    target.style.backgroundImage = "url('" + url.replace(/'/g, "\\'") + "')";
    target.style.backgroundSize = "cover";
    target.style.backgroundPosition = "center center";
    target.style.backgroundRepeat = "no-repeat";

    if (!target.style.minHeight) {
      target.style.minHeight = "240px";
    }

    alert("背景画像を設定しました。");
  }

  function setBackgroundByUrl() {
    const url = prompt(
      "背景画像のURLを入力してください。\nアップロード済み画像のURL、または画像リンクを入れます。",
      ""
    );

    if (!url) return;

    applyBackgroundUrl(url.trim());
  }

  function selectedImageToBackground() {
    const el = getSelectedOrAlert();

    if (!el) return;

    let img = null;

    if (el.tagName && el.tagName.toLowerCase() === "img") {
      img = el;
    } else if (el.querySelector) {
      img = el.querySelector("img");
    }

    if (!img || !img.src) {
      alert("選択した要素の中に画像がありません。画像をクリックしてから押してください。");
      return;
    }

    applyBackgroundUrl(img.src);

    const hideOriginal = confirm("元の画像を非表示にしますか？\n背景だけにしたい場合はOK、画像も残す場合はキャンセル。");

    if (hideOriginal) {
      img.style.display = "none";
    }
  }

  function clearBackground() {
    const target = findBackgroundTarget();

    if (!target) {
      alert("背景を解除する対象が見つかりません。");
      return;
    }

    target.style.backgroundImage = "";
    target.style.backgroundSize = "";
    target.style.backgroundPosition = "";
    target.style.backgroundRepeat = "";

    alert("背景画像を解除しました。");
  }

  function ensurePositioned(el) {
    if (!el) return;

    const doc = getEditorDocument();
    const computed = doc.defaultView.getComputedStyle(el);

    if (computed.position === "static") {
      el.style.position = "relative";
    }
  }

  function getCurrentZ(el) {
    const doc = getEditorDocument();
    const computed = doc.defaultView.getComputedStyle(el);

    const raw = el.style.zIndex || computed.zIndex;
    const z = parseInt(raw, 10);

    if (Number.isFinite(z)) return z;

    return 0;
  }

  function setZIndex(mode) {
    const el = getSelectedOrAlert();

    if (!el) return;

    ensurePositioned(el);

    const current = getCurrentZ(el);
    let next = current;

    if (mode === "front") {
      next = current + 10;
    }

    if (mode === "back") {
      next = Math.max(0, current - 10);
    }

    if (mode === "top") {
      next = 9999;
    }

    if (mode === "bottom") {
      next = 0;
    }

    el.style.zIndex = String(next);

    alert("重なり順を変更しました。z-index: " + next);
  }

  function makeButton(id, text, className, onClick) {
    const btn = document.createElement("button");
    btn.id = id;
    btn.type = "button";
    btn.className = "txo-bg-z-btn " + (className || "");
    btn.textContent = text;
    btn.addEventListener("click", onClick);
    return btn;
  }

  function addButtons() {
    if (document.getElementById("txoBgUrlBtn")) return;

    const buttons = Array.from(document.querySelectorAll("button"));

    const imageAddBtn = buttons.find(btn => {
      return (btn.textContent || "").trim() === "画像追加";
    });

    const publishBtn = buttons.find(btn => {
      return (btn.textContent || "").trim() === "公開";
    });

    const area =
      imageAddBtn && imageAddBtn.parentElement
        ? imageAddBtn.parentElement
        : publishBtn && publishBtn.parentElement
          ? publishBtn.parentElement
          : document.body;

    const bgUrlBtn = makeButton(
      "txoBgUrlBtn",
      "背景画像追加",
      "txo-bg-btn",
      setBackgroundByUrl
    );

    const imgBgBtn = makeButton(
      "txoImgToBgBtn",
      "選択画像を背景",
      "txo-bg-btn",
      selectedImageToBackground
    );

    const clearBgBtn = makeButton(
      "txoClearBgBtn",
      "背景解除",
      "txo-bg-btn",
      clearBackground
    );

    const frontBtn = makeButton(
      "txoZFrontBtn",
      "前面へ",
      "txo-z-btn",
      function () { setZIndex("front"); }
    );

    const backBtn = makeButton(
      "txoZBackBtn",
      "背面へ",
      "txo-z-btn",
      function () { setZIndex("back"); }
    );

    const topBtn = makeButton(
      "txoZTopBtn",
      "最前面",
      "txo-z-btn",
      function () { setZIndex("top"); }
    );

    const bottomBtn = makeButton(
      "txoZBottomBtn",
      "最背面",
      "txo-z-btn",
      function () { setZIndex("bottom"); }
    );

    const insertAfter = imageAddBtn || publishBtn;

    if (insertAfter && insertAfter.nextSibling) {
      area.insertBefore(bottomBtn, insertAfter.nextSibling);
      area.insertBefore(topBtn, bottomBtn);
      area.insertBefore(backBtn, topBtn);
      area.insertBefore(frontBtn, backBtn);
      area.insertBefore(clearBgBtn, frontBtn);
      area.insertBefore(imgBgBtn, clearBgBtn);
      area.insertBefore(bgUrlBtn, imgBgBtn);
    } else {
      area.appendChild(bgUrlBtn);
      area.appendChild(imgBgBtn);
      area.appendChild(clearBgBtn);
      area.appendChild(frontBtn);
      area.appendChild(backBtn);
      area.appendChild(topBtn);
      area.appendChild(bottomBtn);
    }
  }

  function setupAll() {
    addButtons();
    setupSelection();
  }

  if (document.readyState === "loading") {
    document.addEventListener("DOMContentLoaded", setupAll);
  } else {
    setupAll();
  }

  setTimeout(setupAll, 500);
  setTimeout(setupAll, 1500);

  const frame = getFrame();

  if (frame) {
    frame.addEventListener("load", function () {
      setTimeout(setupAll, 300);
    });
  }
})();
</script>

<script>
(function () {
  function normalizeText(text) {
    return (text || "").replace(/\s+/g, "").trim();
  }

  function makeToolbarTabs() {
    if (document.getElementById("editorTabToolbar")) return;

    const groups = [
      {
        name: "基本操作",
        items: ["1つ戻る", "ドラッグ移動", "自由リサイズ", "文字追加", "画像追加", "動画追加"]
      },
      {
        name: "背景",
        items: ["背景画像追加", "選択画像を背景", "背景解除"]
      },
      {
        name: "画像サイズ",
        items: ["画像 全幅", "画像 枠に合わせる", "画像 枠いっぱい", "画像 自由サイズ"]
      },
      {
        name: "重なり順",
        items: ["前面へ", "背面へ", "最前面", "最背面"]
      },
      {
        name: "保存",
        items: ["保存", "読込", "下書き保存", "下書き読込", "公開"]
      }
    ];

    const allButtons = Array.from(document.querySelectorAll("button"));

    const buttonMap = new Map();

    allButtons.forEach((btn) => {
      const key = normalizeText(btn.textContent);
      if (!buttonMap.has(key)) {
        buttonMap.set(key, btn);
      }
    });

    const toolbar = document.createElement("div");
    toolbar.id = "editorTabToolbar";

    const tabButtons = document.createElement("div");
    tabButtons.className = "tab-buttons";

    const panels = [];

    groups.forEach((group, index) => {
      const tab = document.createElement("button");
      tab.type = "button";
      tab.className = "tab-button" + (index === 0 ? " active" : "");
      tab.textContent = group.name;

      const panel = document.createElement("div");
      panel.className = "tab-panel" + (index === 0 ? " active" : "");

      group.items.forEach((label) => {
        const btn = buttonMap.get(normalizeText(label));
        if (btn) {
          panel.appendChild(btn);
        }
      });

      tab.addEventListener("click", () => {
        document.querySelectorAll("#editorTabToolbar .tab-button").forEach((b) => {
          b.classList.remove("active");
        });

        document.querySelectorAll("#editorTabToolbar .tab-panel").forEach((p) => {
          p.classList.remove("active");
        });

        tab.classList.add("active");
        panel.classList.add("active");
      });

      tabButtons.appendChild(tab);
      panels.push(panel);
    });

    toolbar.appendChild(tabButtons);
    panels.forEach((panel) => toolbar.appendChild(panel));

    document.body.insertBefore(toolbar, document.body.firstChild);
  }

  if (document.readyState === "loading") {
    document.addEventListener("DOMContentLoaded", makeToolbarTabs);
  } else {
    makeToolbarTabs();
  }
})();
</script>
<script>
/* === 背景画像追加パッチ === */
(function () {
  const PATCH_ID = "bg-image-upload-patch";
  if (document.getElementById(PATCH_ID)) return;

  const marker = document.createElement("script");
  marker.id = PATCH_ID;
  marker.type = "application/json";
  marker.textContent = "installed";
  document.head.appendChild(marker);

  let lastBackgroundTarget = null;

  function normalizeText(text) {
    return (text || "").replace(/\s+/g, "").trim();
  }

  function getEditorFrame() {
    return document.getElementById("editorFrame") || document.querySelector("iframe");
  }

  function getFrameDocument() {
    const frame = getEditorFrame();
    if (!frame) return null;
    return frame.contentDocument || frame.contentWindow?.document || null;
  }

  function bindFrameClickTracker() {
    const doc = getFrameDocument();
    if (!doc || doc.__bgImageTrackerBound) return;

    doc.__bgImageTrackerBound = true;

    doc.addEventListener(
      "click",
      function (e) {
        lastBackgroundTarget = e.target;
      },
      true
    );
  }

  function getBackgroundTarget() {
    const doc = getFrameDocument();
    const frame = getEditorFrame();

    if (!doc) return null;

    // 既存コード側で selectedElement が window に出ている場合
    if (window.selectedElement && window.selectedElement.ownerDocument === doc) {
      return window.selectedElement;
    }

    if (
      frame &&
      frame.contentWindow &&
      frame.contentWindow.selectedElement &&
      frame.contentWindow.selectedElement.ownerDocument === doc
    ) {
      return frame.contentWindow.selectedElement;
    }

    // よくある選択クラスを探す
    const selected =
      doc.querySelector(".selected") ||
      doc.querySelector(".is-selected") ||
      doc.querySelector(".editing-selected") ||
      doc.querySelector("[data-selected='true']");

    if (selected) return selected;

    // 最後にクリックした場所
    if (lastBackgroundTarget && lastBackgroundTarget.ownerDocument === doc) {
      return lastBackgroundTarget;
    }

    // 未選択ならページ全体
    return doc.body || doc.documentElement;
  }

  function applyBackgroundImage(dataUrl) {
    const target = getBackgroundTarget();

    if (!target) {
      alert("背景を設定する場所が見つかりませんでした");
      return;
    }

    target.style.backgroundImage = 'url("' + dataUrl + '")';
    target.style.backgroundSize = "cover";
    target.style.backgroundPosition = "center";
    target.style.backgroundRepeat = "no-repeat";

    if (target.tagName === "BODY" || target.tagName === "HTML") {
      target.style.minHeight = "100vh";
    }

    alert("背景画像を追加しました");
  }

  function openBackgroundImagePicker() {
    bindFrameClickTracker();

    let input = document.getElementById("backgroundImageUploadInput");

    if (!input) {
      input = document.createElement("input");
      input.id = "backgroundImageUploadInput";
      input.type = "file";
      input.accept = "image/*";
      input.style.display = "none";
      document.body.appendChild(input);

      input.addEventListener("change", function () {
        const file = input.files && input.files[0];
        if (!file) return;

        const reader = new FileReader();

        reader.onload = function () {
          applyBackgroundImage(reader.result);
          input.value = "";
        };

        reader.readAsDataURL(file);
      });
    }

    input.click();
  }

  function setupBackgroundImageButton() {
    bindFrameClickTracker();

    const buttons = Array.from(document.querySelectorAll("button"));

    let btn = buttons.find(function (button) {
      const text = normalizeText(button.textContent);
      return text === "背景画像追加" || text === "背景URL";
    });

    if (!btn) return;

    btn.textContent = "背景画像追加";

    // 元のURL入力イベントを消すためにボタンを複製して差し替え
    const cleanBtn = btn.cloneNode(true);
    cleanBtn.textContent = "背景画像追加";
    cleanBtn.removeAttribute("onclick");

    btn.parentNode.replaceChild(cleanBtn, btn);

    cleanBtn.addEventListener("click", function (e) {
      e.preventDefault();
      e.stopPropagation();
      openBackgroundImagePicker();
    });
  }

  const frame = getEditorFrame();
  if (frame) {
    frame.addEventListener("load", bindFrameClickTracker);
  }

  if (document.readyState === "loading") {
    document.addEventListener("DOMContentLoaded", setupBackgroundImageButton);
  } else {
    setupBackgroundImageButton();
  }
})();
</script>
<script id="clean-editor-artifacts-before-publish">
(function () {
  function isCyanStyle(value) {
    if (!value) return false;
    value = String(value).toLowerCase();
    return (
      value.includes("rgb(0, 255") ||
      value.includes("rgb(0,255") ||
      value.includes("#00ffd") ||
      value.includes("#00ff") ||
      value.includes("cyan") ||
      value.includes("aqua")
    );
  }

  function cleanRoot(root) {
    if (!root) return;

    const doc = root.nodeType === 9 ? root : root.ownerDocument;
    const scope = root.nodeType === 9 ? root : root;

    const removeSelectors = [
      ".resize-handle",
      ".resizeHandles",
      ".resize-dot",
      ".selection-handle",
      ".editor-handle",
      ".drag-handle",
      ".selected-handle",
      ".image-resize-handle",
      ".text-resize-handle",
      ".move-handle",
      ".rotate-handle",
      "[data-resize-handle]",
      "[data-editor-handle]",
      "[data-selection-handle]",
      "[data-drag-handle]",
      "[contenteditable='false'].resize-handle"
    ];

    scope.querySelectorAll(removeSelectors.join(",")).forEach(function (el) {
      el.remove();
    });

    scope.querySelectorAll("*").forEach(function (el) {
      const cs = doc.defaultView.getComputedStyle(el);

      const w = parseFloat(cs.width) || 0;
      const h = parseFloat(cs.height) || 0;

      const looksLikeSmallHandle =
        w > 0 &&
        h > 0 &&
        w <= 24 &&
        h <= 24 &&
        (cs.position === "absolute" || cs.position === "fixed") &&
        (
          isCyanStyle(cs.backgroundColor) ||
          isCyanStyle(cs.borderColor) ||
          isCyanStyle(cs.outlineColor)
        );

      if (looksLikeSmallHandle) {
        el.remove();
        return;
      }

      el.classList.remove(
        "selected",
        "is-selected",
        "editing-selected",
        "editor-selected",
        "selected-element",
        "image-selected",
        "active-selected"
      );

      el.removeAttribute("data-selected");
      el.removeAttribute("data-editor-selected");
      el.removeAttribute("data-resize-handle");
      el.removeAttribute("data-selection-handle");
      el.removeAttribute("contenteditable");

      const style = el.style;

      if (
        isCyanStyle(style.outline) ||
        isCyanStyle(style.outlineColor) ||
        isCyanStyle(style.boxShadow)
      ) {
        style.outline = "none";
        style.outlineColor = "";
        style.boxShadow = "none";
      }

      // 公開時だけ、選択用の水色borderを消す
      if (
        isCyanStyle(style.border) ||
        isCyanStyle(style.borderColor) ||
        isCyanStyle(cs.borderTopColor) ||
        isCyanStyle(cs.borderRightColor) ||
        isCyanStyle(cs.borderBottomColor) ||
        isCyanStyle(cs.borderLeftColor)
      ) {
        style.borderColor = "transparent";
        style.outline = "none";
        style.boxShadow = "none";
      }
    });
  }

  function getFrameDocument() {
    const frame =
      document.getElementById("editorFrame") ||
      document.querySelector("iframe");

    if (!frame) return null;

    try {
      return frame.contentDocument || frame.contentWindow.document;
    } catch (e) {
      return null;
    }
  }

  function cleanBeforeSaveOrPublish() {
    cleanRoot(document);

    const frameDoc = getFrameDocument();
    if (frameDoc) {
      cleanRoot(frameDoc);
    }
  }

  // 保存・公開ボタンを押す前に先に掃除する
  document.addEventListener(
    "click",
    function (e) {
      const btn = e.target.closest && e.target.closest("button");
      if (!btn) return;

      const text = (btn.textContent || "").replace(/\s+/g, "");

      if (
        text.includes("公開") ||
        text.includes("保存") ||
        text.includes("下書き保存")
      ) {
        cleanBeforeSaveOrPublish();
      }
    },
    true
  );

  window.cleanBeforeSaveOrPublish = cleanBeforeSaveOrPublish;
})();
</script>
